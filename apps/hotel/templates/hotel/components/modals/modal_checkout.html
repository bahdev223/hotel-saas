<div x-show="modals.checkout" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4" @click.self="closeModal('checkout')">
    <div class="w-full max-w-sm rounded-2xl bg-surface-container-high shadow-xl">
        <div class="border-b border-outline/10 px-5 py-4">
            <h2 class="text-lg font-semibold text-on-surface">Terminer la réservation</h2>
        </div>
        <div class="space-y-4 p-5">
            <p class="text-sm text-on-surface-variant">Confirmer la fin de cette réservation ?</p>
            <div class="flex gap-3 pt-2">
                <button @click="doCheckout()" class="flex-1 rounded-lg bg-orange-700 py-2 text-white hover:opacity-90">Confirmer</button>
                <button @click="closeModal('checkout')" class="btn-md3-secondary flex-1 py-2 rounded-lg">Annuler</button>
            </div>
        </div>
    </div>
</div>
