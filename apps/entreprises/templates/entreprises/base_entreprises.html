{% extends 'base.html' %}
{% load static %}

{% block subnav %}
<nav class="bg-surface-container border-b border-outline/10 overflow-x-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex gap-1 py-1.5 text-sm whitespace-nowrap">
            <a href="{% url 'entreprises:dashboard' %}" class="px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-smooth {% if request.resolver_match.view_name == 'entreprises:dashboard' %}text-secondary bg-secondary-container/20{% else %}text-on-surface-variant{% endif %}">
                <i class="fas fa-building mr-1.5"></i>Entreprise
            </a>
            <a href="{% url 'entreprises:editer' %}" class="px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-smooth {% if request.resolver_match.view_name == 'entreprises:editer' %}text-secondary bg-secondary-container/20{% else %}text-on-surface-variant{% endif %}">
                <i class="fas fa-pen mr-1.5"></i>Modifier
            </a>
            <a href="{% url 'entreprises:configuration' %}" class="px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-smooth {% if request.resolver_match.view_name == 'entreprises:configuration' %}text-secondary bg-secondary-container/20{% else %}text-on-surface-variant{% endif %}">
                <i class="fas fa-cog mr-1.5"></i>Configuration
            </a>
            <a href="{% url 'entreprises:modules' %}" class="px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-smooth {% if request.resolver_match.view_name == 'entreprises:modules' %}text-secondary bg-secondary-container/20{% else %}text-on-surface-variant{% endif %}">
                <i class="fas fa-puzzle-piece mr-1.5"></i>Modules
            </a>
            <a href="{% url 'entreprises:sequences' %}" class="px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-smooth {% if request.resolver_match.view_name == 'entreprises:sequences' %}text-secondary bg-secondary-container/20{% else %}text-on-surface-variant{% endif %}">
                <i class="fas fa-sort-numeric-down mr-1.5"></i>Séquences
            </a>
        </div>
    </div>
</nav>
{% endblock %}
