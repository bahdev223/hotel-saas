<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Stocks{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'stocks:dashboard' %}">
                <i class="bi bi-box-seam me-2"></i>Stocks
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-gear"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/admin/stocks/">Admin Django</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="themeToggle">
                                <i class="bi bi-moon-stars me-2"></i>Mode sombre
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-light sidebar py-3" id="sidebar">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'dashboard' %}active fw-bold{% endif %}" href="{% url 'stocks:dashboard' %}">
                            <i class="bi bi-speedometer2 me-2"></i>Tableau de bord
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'articles' %}active fw-bold{% endif %}" href="{% url 'stocks:article_list' %}">
                            <i class="bi bi-box me-2"></i>Articles
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'depots' %}active fw-bold{% endif %}" href="{% url 'stocks:depot_list' %}">
                            <i class="bi bi-building me-2"></i>Dépôts
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'mouvements' %}active fw-bold{% endif %}" href="{% url 'stocks:mouvement_list' %}">
                            <i class="bi bi-arrow-left-right me-2"></i>Mouvements
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'inventaires' %}active fw-bold{% endif %}" href="{% url 'stocks:inventaire_list' %}">
                            <i class="bi bi-clipboard-data me-2"></i>Inventaires
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'lots' %}active fw-bold{% endif %}" href="{% url 'stocks:lot_list' %}">
                            <i class="bi bi-tags me-2"></i>Lots
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'journal' %}active fw-bold{% endif %}" href="{% url 'stocks:journal_stock' %}">
                            <i class="bi bi-journal-text me-2"></i>Journal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if section == 'valorisation' %}active fw-bold{% endif %}" href="{% url 'stocks:valorisation' %}">
                            <i class="bi bi-currency-euro me-2"></i>Valorisation
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-4 py-3">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('themeToggle')?.addEventListener('click', function(e) {
            e.preventDefault();
            const html = document.documentElement;
            const theme = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', theme);
            this.innerHTML = theme === 'dark'
                ? '<i class="bi bi-sun me-2"></i>Mode clair'
                : '<i class="bi bi-moon-stars me-2"></i>Mode sombre';
            localStorage.setItem('theme', theme);
        });
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
