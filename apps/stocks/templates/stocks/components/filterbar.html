<form method="get" class="row g-2 align-items-end mb-3">
    <div class="col-auto flex-grow-1">
        <input type="text" name="q" class="form-control form-control-sm" placeholder="Rechercher..." value="{{ q|default:'' }}">
    </div>
    {% for filter in filters %}
    <div class="col-auto">
        <select name="{{ filter.name }}" class="form-select form-select-sm" onchange="this.form.submit()">
            <option value="">{{ filter.label }}</option>
            {% for val, label in filter.choices %}
            <option value="{{ val }}" {% if request.GET|dictsort:filter.name == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    {% endfor %}
    <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-search"></i></button>
        <a href="." class="btn btn-sm btn-outline-secondary"><i class="bi bi-x-circle"></i></a>
    </div>
</form>
