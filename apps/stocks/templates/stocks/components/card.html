<div class="card h-100 border-0 shadow-sm">
    <div class="card-body">
        {% if icon %}<div class="fs-2 text-{{ color|default:'primary' }} mb-2"><i class="bi bi-{{ icon }}"></i></div>{% endif %}
        <h6 class="card-subtitle text-muted mb-1">{{ label }}</h6>
        <h3 class="card-title mb-0">{{ value }}</h3>
        {% if footer %}<small class="text-muted">{{ footer }}</small>{% endif %}
    </div>
</div>
