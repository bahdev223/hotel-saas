<div class="card border-0 shadow-sm h-100">
    <div class="card-header bg-white fw-semibold">
        <i class="bi bi-clock me-2 text-danger"></i>Lots expirants (30 jours)
    </div>
    <div class="card-body p-0">
        {% if lots_expirants %}
        <div class="list-group list-group-flush">
            {% for l in lots_expirants %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <span><strong>{{ l.numero_lot }}</strong> — {{ l.article.code }}</span>
                <span class="badge bg-danger rounded-pill">{{ l.date_peremption|date:"d/m/Y" }}</span>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="p-3 text-muted"><i class="bi bi-check-circle me-1 text-success"></i>Aucun lot proche de l'expiration</div>
        {% endif %}
    </div>
</div>
