{% extends "comptabilite/base_compta.html" %}
{% load static %}

{% block title %}Nouvelle recette - Comptabilité{% endblock %}

{% block header %}Nouvelle recette{% endblock %}
{% block subtitle %}Encaissement hors vente{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <form method="post" class="bg-surface-container-low rounded-2xl border-outline/10 p-6 space-y-4">
        {% csrf_token %}
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Date *</label>
                <input type="date" name="date_operation" required class="w-full px-3 py-2 input-md3 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Client</label>
                <input type="text" name="client" class="w-full px-3 py-2 input-md3 rounded-lg" placeholder="Nom du client (optionnel)">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium mb-1">Description *</label>
            <input type="text" name="description" required class="w-full px-3 py-2 input-md3 rounded-lg" placeholder="Motif de la recette">
        </div>
        
        <div>
            <label class="block text-sm font-medium mb-1">Montant (FCFA) *</label>
            <input type="number" step="1" name="montant" required class="w-full px-3 py-2 input-md3 rounded-lg">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Mode de paiement</label>
                <select name="mode_paiement" class="w-full px-3 py-2 input-md3 rounded-lg">
                    <option value="ESPECES">💰 Espèces</option>
                    <option value="CARTE">💳 Carte bancaire</option>
                    <option value="VIREMENT">🏦 Virement</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Caisse</label>
                <select name="caisse_id" class="w-full px-3 py-2 input-md3 rounded-lg">
                    <option value="">-- Sélectionner --</option>
                    {% for caisse in caisses %}
                    <option value="{{ caisse.id }}">{{ caisse.nom }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea name="notes" rows="2" class="w-full px-3 py-2 input-md3 rounded-lg"></textarea>
        </div>
        
        <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 bg-secondary text-on-secondary py-2 rounded-lg">Enregistrer la recette</button>
            <a href="{% url 'comptabilite:operations' %}" class="flex-1 border-outline/10 py-2 rounded-lg text-center text-on-surface">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
