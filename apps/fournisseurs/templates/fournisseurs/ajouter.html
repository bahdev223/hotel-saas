{% extends 'fournisseurs/base_fournisseurs.html' %}
{% load static %}

{% block title %}Ajouter un fournisseur{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card-md3">
        <div class="px-6 py-4 border-b border-outline/10 flex items-center gap-3">
            <a href="{% url 'fournisseurs:dashboard' %}" class="text-on-surface-variant hover:text-on-surface"><i class="fas fa-arrow-left"></i></a>
            <h2 class="text-lg font-bold"><i class="fas fa-plus-circle text-secondary mr-2"></i>Nouveau fournisseur</h2>
        </div>
        <form method="post" class="p-6 space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Nom *</label>
                    <input type="text" name="nom" class="input-md3 rounded-lg w-full" required>
                </div>
                <div>
                    <label class="label-md3">Code</label>
                    <input type="text" name="code" class="input-md3 rounded-lg w-full" placeholder="Auto-généré si vide">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Téléphone</label>
                    <input type="text" name="telephone" class="input-md3 rounded-lg w-full">
                </div>
                <div>
                    <label class="label-md3">Email</label>
                    <input type="email" name="email" class="input-md3 rounded-lg w-full">
                </div>
            </div>
            <div>
                <label class="label-md3">Adresse</label>
                <textarea name="adresse" class="input-md3 rounded-lg w-full text-sm" rows="2"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Contact</label>
                    <input type="text" name="contact" class="input-md3 rounded-lg w-full">
                </div>
                <div>
                    <label class="label-md3">NIF / Identifiant fiscal</label>
                    <input type="text" name="identifiant_fiscal" class="input-md3 rounded-lg w-full">
                </div>
            </div>
            <div>
                <label class="label-md3">Compte comptable</label>
                <select name="compte_comptable_id" class="input-md3 rounded-lg w-full">
                    <option value="">— Aucun —</option>
                    {% for cc in comptes_comptables %}
                    <option value="{{ cc.id }}">{{ cc.code }} — {{ cc.libelle }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="label-md3">Notes</label>
                <textarea name="notes" class="input-md3 rounded-lg w-full text-sm" rows="2"></textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="flex-1 btn-md3-primary py-2 rounded-lg">Ajouter</button>
                <a href="{% url 'fournisseurs:dashboard' %}" class="flex-1 border border-outline/10 py-2 rounded-lg text-sm hover:bg-surface-container transition-smooth text-center">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
