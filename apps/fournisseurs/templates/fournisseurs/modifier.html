{% extends 'fournisseurs/base_fournisseurs.html' %}
{% load static %}

{% block title %}Modifier {{ fournisseur.nom }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card-md3">
        <div class="px-6 py-4 border-b border-outline/10 flex items-center gap-3">
            <a href="{% url 'fournisseurs:detail' fournisseur.id %}" class="text-on-surface-variant hover:text-on-surface"><i class="fas fa-arrow-left"></i></a>
            <h2 class="text-lg font-bold"><i class="fas fa-edit text-secondary mr-2"></i>Modifier {{ fournisseur.nom }}</h2>
        </div>
        <form method="post" class="p-6 space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Nom *</label>
                    <input type="text" name="nom" value="{{ fournisseur.nom }}" class="input-md3 rounded-lg w-full" required>
                </div>
                <div>
                    <label class="label-md3">Code</label>
                    <input type="text" name="code" value="{{ fournisseur.code }}" class="input-md3 rounded-lg w-full">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Téléphone</label>
                    <input type="text" name="telephone" value="{{ fournisseur.telephone|default:'' }}" class="input-md3 rounded-lg w-full">
                </div>
                <div>
                    <label class="label-md3">Email</label>
                    <input type="email" name="email" value="{{ fournisseur.email|default:'' }}" class="input-md3 rounded-lg w-full">
                </div>
            </div>
            <div>
                <label class="label-md3">Adresse</label>
                <textarea name="adresse" class="input-md3 rounded-lg w-full text-sm" rows="2">{{ fournisseur.adresse|default:'' }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-md3">Contact</label>
                    <input type="text" name="contact" value="{{ fournisseur.contact|default:'' }}" class="input-md3 rounded-lg w-full">
                </div>
                <div>
                    <label class="label-md3">NIF</label>
                    <input type="text" name="identifiant_fiscal" value="{{ fournisseur.identifiant_fiscal|default:'' }}" class="input-md3 rounded-lg w-full">
                </div>
            </div>
            <div>
                <label class="label-md3">Compte comptable</label>
                <select name="compte_comptable_id" class="input-md3 rounded-lg w-full">
                    <option value="">— Aucun —</option>
                    {% for cc in comptes_comptables %}
                    <option value="{{ cc.id }}" {% if fournisseur.compte_comptable_id == cc.id %}selected{% endif %}>{{ cc.code }} — {{ cc.libelle }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="label-md3">Notes</label>
                <textarea name="notes" class="input-md3 rounded-lg w-full text-sm" rows="2">{{ fournisseur.notes|default:'' }}</textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="flex-1 btn-md3-primary py-2 rounded-lg">Enregistrer</button>
                <a href="{% url 'fournisseurs:detail' fournisseur.id %}" class="flex-1 border border-outline/10 py-2 rounded-lg text-sm hover:bg-surface-container transition-smooth text-center">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
