{% extends 'paie/base_paie.html' %}
{% load static %}

{% block paie_content %}
<div class="max-w-md mx-auto">
    <div class="bg-surface-container-low rounded-xl shadow-md">
        <div class="px-6 py-4 border-b">
            <h2 class="text-xl font-bold">Créer une période de paie</h2>
        </div>
        
        <form method="post" class="p-6">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Année</label>
                <select name="annee" required class="w-full px-3 py-2 input-md3 rounded-lg">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Mois</label>
                <select name="mois" required class="w-full px-3 py-2 input-md3 rounded-lg">
                    <option value="1">Janvier</option>
                    <option value="2">Février</option>
                    <option value="3">Mars</option>
                    <option value="4">Avril</option>
                    <option value="5">Mai</option>
                    <option value="6">Juin</option>
                    <option value="7">Juillet</option>
                    <option value="8">Août</option>
                    <option value="9">Septembre</option>
                    <option value="10">Octobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Décembre</option>
                </select>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button type="submit" class="flex-1 btn btn-primary">
                    <i class="fas fa-save"></i> Créer
                </button>
                <a href="{% url 'paie:liste_periodes' %}" class="flex-1 btn btn-outline">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
