<!-- apps/pos/templates/pos/base_pos.html -->
{% load static %}
<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS - Point de vente{% endblock %} — HotelERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#131313", "surface": "#131313", "surface-bright": "#393939",
                        "surface-container-lowest": "#0e0e0e", "surface-container-low": "#1c1b1b",
                        "surface-container": "#20201f", "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353535",
                        "on-surface": "#e5e2e1", "on-surface-variant": "#c4c7c7",
                        "secondary": "#e3c282", "secondary-container": "#5c4611",
                        "on-secondary": "#402d00",
                        "error": "#ffb4ab", "error-container": "#93000a",
                        "outline": "#8e9192",
                        "background": "#131313",
                    },
                    fontFamily: { "body-md": ["Hanken Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .scrollbar-md::-webkit-scrollbar { width: 6px; }
        .scrollbar-md::-webkit-scrollbar-track { background: #2a2a2a; border-radius: 10px; }
        .scrollbar-md::-webkit-scrollbar-thumb { background: #c9c6c5; border-radius: 10px; }
        .scrollbar-md::-webkit-scrollbar-thumb:hover { background: #e3c282; }
        .transition-smooth { transition: all 0.2s ease-in-out; }
        @layer components {
            .input-md3 {
                @apply w-full border-b-2 border-transparent rounded-t-lg px-4 py-3
                       focus:border-secondary focus:ring-0 outline-none transition-all duration-200;
                background-color: #353535 !important; color: #e5e2e1 !important;
            }
            .label-md3 {
                @apply text-[11px] font-bold text-secondary uppercase tracking-wider mb-1 block pl-1;
            }
            .btn-md3-primary {
                @apply bg-secondary text-on-secondary px-6 py-3 rounded-full font-bold
                       hover:shadow-lg hover:shadow-secondary/20 active:scale-95 transition-all disabled:opacity-30;
            }
            .card-md3 {
                @apply bg-surface-container-low border border-outline/10 rounded-xl;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-surface-container-high text-on-surface font-body-md">
<div class="min-h-screen flex flex-col">

    <!-- Top Navbar -->
    <nav class="bg-surface-container border-b border-outline/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-3 hover:opacity-85 transition-smooth">
                    <img src="{% static 'img/logo.jpg' %}" alt="HotelERP" class="w-10 h-10 rounded-lg shadow-md object-cover">
                    <div>
                        <span class="text-lg font-bold text-on-surface">HotelERP</span>
                    </div>
                </a>
                <div class="flex items-center gap-3">
                    <a href="{% url 'pos:employe_dashboard' %}" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-secondary/10 text-secondary hover:bg-secondary/20 transition-smooth" title="Mon tableau de bord">
                        <i class="fas fa-tachometer-alt mr-1"></i>Mon espace
                    </a>
                    <a href="{% url 'pos:liste_points_vente' %}" class="px-3 py-1.5 rounded-lg text-xs font-medium text-on-surface-variant hover:bg-surface-container-high transition-smooth" title="Points de vente">
                        <i class="fas fa-store mr-1"></i>Points de vente
                    </a>
                    <span class="hidden sm:inline text-sm text-on-surface-variant font-medium">{{ user.username }}</span>
                    <a href="{% url 'authentication:logout' %}" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high hover:bg-error-container/20 text-on-surface-variant hover:text-error transition-smooth" title="Déconnexion">
                        <i class="fas fa-sign-out-alt text-sm"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</div>
</body>
</html>
